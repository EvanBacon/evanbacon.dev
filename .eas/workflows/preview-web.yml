name: Web Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy_preview:
    name: Deploy Web Preview
    type: deploy
    environment: preview
    env:
      DATA_ENCRYPTION_KEY: ${{ secrets.DATA_ENCRYPTION_KEY }}
    params:
      alias: pr-${{ github.event.pull_request.number }}
